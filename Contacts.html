<!DOCTYPE html>
<html>
<head>
<title>Contact</title>

<style>
#popup {
position: fixed;
top: 20px;
right: 20px;
background: #4CAF50;
color: white;
padding: 15px 25px;
border-radius: 8px;
display: none;
font-family: Arial;
box-shadow: 0 4px 10px rgba(0,0,0,0.2);
}
</style>

</head>

<body>

<div id="popup">Your message was sent successfully!</div>

<a id="top"></a>

<header>
<h1>Contact Me</h1>
</header>

<nav role="navigation">
<a href="index.html">Home</a> |
<a href="CV.html">CV</a> |
<a href="Projects.html">Projects</a> |
<a href="Contacts.html">Contact</a>
</nav>

<main>

<h2>Contact Form</h2>

<form id="contactForm" onsubmit="showPopup(); return false;">

<label>Name:</label><br>
<input type="text" name="name" required><br><br>

<label>Email:</label><br>
<input type="email" name="email" required><br><br>

<label>Message:</label><br>
<textarea name="message" rows="5" cols="30" required></textarea><br><br>

<input type="submit" value="Send Message">

</form>

<h2>Email Me Directly</h2>

<p>
<a href="mailto:your@email.com">Send Email</a>
</p>

<a href="#top">Back to Top</a>

</main>

<footer>
<p>© Maramalsheddi Website</p>
</footer>

<script>

function showPopup() {

document.getElementById("popup").style.display = "block";

document.getElementById("contactForm").reset();

setTimeout(function(){
document.getElementById("popup").style.display = "none";
}, 3000);

}

</script>

</body>
</html>
